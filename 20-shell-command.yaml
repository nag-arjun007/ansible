- name: demo on shell vs command
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: command test
    #command: cat /etc/passwd | grep root # command can not use with pipe , var, redirections etc
    shell: cat /etc/passwd | grep root
    register: users_output

  - name: print output
    debug:
      msg: "{{ user_output }}"

  - name: list files
    #command: ls -ltr > /tmp/files.txt
    shell: ls -ltr > /tmp/files.txt     
