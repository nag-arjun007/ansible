- name: even or odd
  hosts: local
  connection: local
  vars:
    given_number: 7
  tasks:
  - when: given_number % 2 == 0
    debug:
      msg: "given number: {{ given number }} is even"
    name: is even

  - when: given_number % 2 != 0
    debug:
      msg: "given number: {{ given number }} is odd"
    name: is odd
